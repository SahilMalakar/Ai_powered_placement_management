name: Deploy to Docker Hub

on:
  push:
    branches:
      - main
      - master
      # Optionally, you can also trigger this on tags:
      # tags:
      #   - 'v*.*.*'

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Sets up Docker Buildx which allows for powerful caching and building
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Safely authenticate to Docker Hub using GitHub Secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Automatically Build and Push from the backend directory
      - name: Build and Push image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: backend/docker/Dockerfile
          push: true
          # Pushing directly to your specific Docker Hub repository
          tags: cosmicleo1/ai-placement-backend:latest
