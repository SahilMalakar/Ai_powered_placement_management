name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: placementcube_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Run Prisma migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/placementcube_test
        run: pnpm prisma migrate deploy --schema=src/prisma/schema.prisma

      - name: Run integration tests
        working-directory: backend
        env:
          NODE_ENV: test
          PORT: 4002
          JWT_SECRET: "test_jwt_secret_signature_for_tnp_placement_tests_only"
          REFRESH_TOKEN_SECRET: "test_refresh_token_secret_signature_for_tnp_placement_tests"
          DATABASE_URL: postgresql://test:test@localhost:5432/placementcube_test
          REDIS_URL: redis://localhost:6379
        run: pnpm vitest run
