version: '3.8'

services:
  # ----------------------------------------
  # 1. Backend Application Layer
  # ----------------------------------------
  backend:
    container_name: tnp-backend-dev
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      # Overriding the local .env URLs because Docker containers need to talk to each other 
      # using container names ('postgres' and 'redis') instead of 'localhost'
      - DATABASE_URL=postgresql://postgres:strongpassword@postgres:5432/placement_db?schema=public
      - REDIS_URL=redis://:strongpassword@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ----------------------------------------
  # 2. Database Server (PostgreSQL)
  # ----------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: tnp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: placement_db
    ports:
      - "5432:5432" # Keeps standard db port accessible from Windows
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d placement_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ----------------------------------------
  # 3. Queue / Cache Server (Redis)
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: tnp-redis
    # Passing the exact password defined in your local .env
    command: redis-server --requirepass strongpassword
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "strongpassword", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
