services:
  backend:
    container_name: tnp-backend-dev
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "4001:4001"
    env_file:
      - ../.env
    # This guarantees 'host.docker.internal' will resolve perfectly
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=development
      # We boldly override the local .env variables right here inline!
      - DATABASE_URL=postgresql://postgres:strongpassword@host.docker.internal:5432/placement_db?schema=public
      - REDIS_URL=redis://:strongpassword@host.docker.internal:6379
    restart: unless-stopped
