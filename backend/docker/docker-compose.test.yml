services:
  postgres-test:
    image: postgres:17-alpine
    container_name: tnp-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: placementcube_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d placementcube_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-test:
    image: redis:7-alpine
    container_name: tnp-redis-test
    command: redis-server --requirepass strongpassword
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "strongpassword", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
